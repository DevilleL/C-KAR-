# docker-compose.yml
services:
  # ==========================================
  # TIER 1 : DMZ (Zone exposée à Internet)
  # ==========================================
  reverse-proxy:
    image: nginx:latest
    ports: 
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - dmz-network
    depends_on:
      - api-gateway

  api-gateway:
    image: kong:latest
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /opt/kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    volumes:
      - ./kong/kong.yml:/opt/kong/kong.yml
    networks:
      - dmz-network
      - app-network # Kong fait le pont entre la DMZ et l'App

  # ==========================================
  # TIER 2 : APPLICATION (Zone Interne)
  # ==========================================
  erp-app:
    image: nginx:alpine
    volumes:
      - ./app_mock/index.html:/usr/share/nginx/html/index.html
    networks:
      - app-network

  # ==========================================
  # TIER 3 : DONNÉES (Zone très sécurisée)
  # ==========================================
  database:
    image: postgres:15
    secrets:
      - db_password
      - db_user
    environment:
      POSTGRES_DB: ckare_erp
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      POSTGRES_USER_FILE: /run/secrets/db_user
    volumes:
      - pg_data:/var/lib/postgresql/data # <--- AJOUT CRITIQUE POUR SAUVEGARDER
    networks:
      - db-network # Seules les apps autorisées peuvent y accéder

  # ==========================================
  # OUTILS : Qualité & Monitoring
  # ==========================================
  sonarqube:
    image: sonarqube:community
    ports: 
      - "9000:9000"
    environment:
       - SONAR_ES_BOOTSTRAP_CHECKS_DISABLE=true
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
    networks:
      - app-network

  grafana:
    image: grafana/grafana
    ports: 
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - app-network

# Définition des réseaux cloisonnés
networks:
  dmz-network:
    driver: bridge
  app-network:
    driver: bridge
  db-network:
    driver: bridge

# Définition des volumes persistants
volumes:
  pg_data:
  sonarqube_data:
  sonarqube_logs:
  grafana_data:

secrets:
  db_password:
    file: ./secrets/db_password.txt
  db_user:
    file: ./secrets/db_user.txt